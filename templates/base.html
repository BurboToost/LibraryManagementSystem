<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Library System{% endblock %}</title>
  <style>
    :root {
      --bg: #f5efe6;
      --bg-soft: #efe4d4;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --text: #1f2937;
      --muted: #5e6674;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --accent: #c58f35;
      --border: rgba(31, 41, 55, 0.08);
      --shadow: 0 20px 50px rgba(31, 41, 55, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(197, 143, 53, 0.18), transparent 26%),
        radial-gradient(circle at right 18%, rgba(15, 118, 110, 0.15), transparent 24%),
        linear-gradient(135deg, var(--bg) 0%, #fbf8f2 46%, var(--bg-soft) 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: inherit;
    }

    .site-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      padding: 18px 22px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.68);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(145deg, var(--brand), var(--brand-dark));
      color: #fff;
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.24);
    }

    .brand-name {
      display: grid;
      gap: 2px;
    }

    .brand-name strong {
      font-size: 1rem;
    }

    .brand-name span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav a {
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--text);
      background: rgba(15, 118, 110, 0.06);
      border: 1px solid rgba(15, 118, 110, 0.08);
      font-size: 0.92rem;
      font-weight: 600;
      transition: transform 180ms ease, background 180ms ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: rgba(15, 118, 110, 0.12);
    }

    .content-card {
      padding: 28px;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .page-title {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .page-lead {
      margin: 0 0 22px;
      max-width: 70ch;
      color: var(--muted);
      line-height: 1.7;
    }

    .cards-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--surface-strong);
      border: 1px solid var(--border);
      box-shadow: 0 14px 28px rgba(31, 41, 55, 0.07);
    }

    .card h2,
    .card h3 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }

    .card p,
    .card li {
      color: var(--muted);
      line-height: 1.65;
    }

    .stack-list {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .stack-list a {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      text-decoration: none;
      background: rgba(15, 118, 110, 0.06);
      font-weight: 600;
      transition: transform 180ms ease, background 180ms ease;
    }

    .stack-list a:hover {
      transform: translateX(3px);
      background: rgba(15, 118, 110, 0.12);
    }

    .stack-list span {
      color: var(--muted);
      font-weight: 500;
    }

    .meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(197, 143, 53, 0.12);
      color: #7a5310;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .button.primary {
      color: #fff;
      background: var(--brand);
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
    }

    .button.secondary {
      border: 1px solid rgba(31, 41, 55, 0.12);
      background: rgba(255, 255, 255, 0.72);
    }

    .button:hover {
      transform: translateY(-2px);
    }

    @media (max-width: 720px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .content-card {
        padding: 22px;
      }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <main class="site-shell">
    <header class="site-header">
      <a class="brand" href="{% url 'home' %}">
        <span class="brand-mark">L</span>
        <span class="brand-name">
          <strong>Library System</strong>
          <span>Catalog, members, borrowing</span>
        </span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'author-list' %}">Authors</a>
        <a href="{% url 'book_list' %}">Books</a>
        <a href="{% url 'member_list' %}">Members</a>
        <a href="{% url 'borrowing_list' %}">Borrowing</a>
      </nav>
    </header>

    <section class="content-card">
      {% block content %}{% endblock %}
    </section>
  </main>
</body>
</html>
