{% extends "base.html" %}

{% block title %}{{ author.name }} | Authors{% endblock %}

{% block content %}
	<p class="meta">Author detail</p>
	<h1 class="page-title">{{ author.name }}</h1>
	<p class="page-lead">{{ author.biography|default:"No biography available." }}</p>

	<div class="button-row">
		<a class="button secondary" href="{% url 'author-list' %}">Back to list</a>
	</div>
{% endblock %}
